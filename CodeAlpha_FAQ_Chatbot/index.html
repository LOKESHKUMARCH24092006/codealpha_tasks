<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Chatbot — Smart Support Assistant</title>
  <meta name="description" content="AI-powered FAQ chatbot using NLP and cosine similarity to instantly answer your questions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<!-- ── Animated Background ── -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="app-container">
  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M9 9h.01M15 9h.01M9.5 13a3.5 3.5 0 0 0 5 0"/>
          </svg>
        </div>
        <span class="logo-text">FAQ<span class="logo-accent">Bot</span></span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
    </div>
    <div class="stats-panel" id="statsPanel">
      <div class="stat-card">
        <span class="stat-num" id="statFaqs">—</span>
        <span class="stat-label">FAQs Indexed</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statCats">—</span>
        <span class="stat-label">Categories</span>
      </div>
    </div>
    <div class="sidebar-section-title">Browse by Topic</div>
    <div class="faq-browser" id="faqBrowser">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="sidebar-footer">
      <div class="nlp-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        TF-IDF + Cosine Similarity
      </div>
      <div class="nlp-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        NLTK Lemmatization
      </div>
    </div>
  </aside>
  <!-- ── Main Chat Area ── -->
  <main class="chat-area">
    <!-- Top Bar -->
    <header class="chat-header">
      <button class="hamburger" id="hamburger" aria-label="Open sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="chat-header-info">
        <div class="avatar-ring">
          <div class="bot-avatar-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="10" rx="2"/><path d="M12 2v5M8 7h8M9 15h.01M15 15h.01"/>
            </svg>
          </div>
        </div>
        <div>
          <h1 class="chat-title">Support Assistant</h1>
          <p class="chat-subtitle"><span class="online-dot"></span>Online · NLP-Powered</p>
        </div>
      </div>
      <button class="clear-btn" id="clearChat" title="Clear conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </header>
    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
      <!-- Welcome card injected by JS -->
    </div>
    <!-- Quick Prompts -->
    <div class="quick-prompts" id="quickPrompts">
      <button class="qp-chip" data-q="How do I reset my password?">🔑 Reset password</button>
      <button class="qp-chip" data-q="Is there a free trial?">🎁 Free trial</button>
      <button class="qp-chip" data-q="How do I contact support?">💬 Contact support</button>
      <button class="qp-chip" data-q="Is my data secure?">🔒 Data security</button>
      <button class="qp-chip" data-q="How do I cancel my subscription?">❌ Cancel subscription</button>
    </div>
    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          class="chat-input"
          placeholder="Ask me anything…"
          rows="1"
          maxlength="500"
          aria-label="Type your question"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="20" height="20">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Powered by NLTK · TF-IDF · Cosine Similarity</p>
    </div>
  </main>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
